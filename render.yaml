services:
  - type: web
    name: portfolio-generator-api
    runtime: python
    runtimeVersion: 3.11
    buildCommand: |
      apt-get update && \
      apt-get install -y libcairo2 libpango-1.0-0 libpango-cairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev libssl-dev && \
      pip install --upgrade pip setuptools wheel && \
      pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8000"
      - key: HOST
        value: "0.0.0.0"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GROQ_API_KEY
        sync: false
