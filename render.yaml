services:
  - type: web
    name: ai-portfolio-maker
    env: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get update && apt-get install -y \
        libpango-1.0-0 \
        libpangocairo-1.0-0 \
        libcairo2 \
        libgdk-pixbuf2.0-0 \
        shared-mime-info
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
